name: Bug report
description: Something behaves differently from what the docs or tests claim.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe, and what did you expect instead?
      placeholder: e.g. a balanced field collapsed to ABSENCE under pressure
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest snippet that shows it. A failing test is ideal.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: 0.1.0 or a commit hash
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Python & OS
      placeholder: Python 3.12 on Ubuntu 24.04
    validations:
      required: false
