name: Feature request / idea
description: Propose a capability, operator, or research direction.
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: The idea
      description: What should exist, and what problem does it solve?
    validations:
      required: true
  - type: textarea
    id: sketch
    attributes:
      label: Sketch (optional)
      description: API shape, math, or a pointer to related work (subjective logic, DS theory, MVL, etc.).
    validations:
      required: false
