site_name: uncollapsed
site_description: Presence/absence fields and edge collapse with a first-class hold.
site_url: https://jfinst1.github.io/uncollapsed/
repo_url: https://github.com/jfinst1/uncollapsed
repo_name: jfinst1/uncollapsed
copyright: Copyright &copy; 2026 Jon Finstad

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

nav:
  - Home: index.md
  - Theory: theory.md
  - Usage: usage.md
  - Benchmarks: benchmarks.md
  - API reference: api.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - tables

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            separate_signature: true
